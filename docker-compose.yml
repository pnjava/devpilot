version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: devpilot-postgres
    environment:
      POSTGRES_USER: devpilot
      POSTGRES_PASSWORD: devpilot_local
      POSTGRES_DB: devpilot_dev
    ports:
      - "5432:5432"
    volumes:
      - devpilot_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devpilot -d devpilot_dev"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: devpilot-redis
    ports:
      - "6379:6379"
    volumes:
      - devpilot_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: devpilot-mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8025"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  devpilot_pgdata:
  devpilot_redis:
